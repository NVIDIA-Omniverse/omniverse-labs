version: 0.1

spec:
  repo: aousd/specifications-public
  tag: v1.0.1
  commit: v1.0.1

nodes:
  usd-identifiers-and-names:
    skill: skills/usd-identifiers-and-names/SKILL.md
    depends_on: []
    provides:
      - capability: identifier_scanner
        contract: contracts/capabilities/identifier-scanner.json
        summary: UTF-8/XID identifier scanning and validation from embedded grammar offsets
      - capability: names
        summary: prim names, property names, namespaced property names, field names, and ASCII type names

  usd-foundational-values:
    skill: skills/usd-foundational-values/SKILL.md
    depends_on:
      - usd-tokens
    provides:
      - capability: foundational_value_model
        contract: contracts/handles/foundational-values.handle.json
        summary: Foundational type catalog, value canonicalization, semantic alias agreement, arrays, dictionaries, and value blocks
    consumes:
      - provider: usd-tokens
        capability: token_identity
        required: true
        contract: contracts/handles/token.handle.json
        semantic_owner: usd-tokens
        allowed_local_logic:
          - tagged token value storage
          - token scalar participation in arrays, dictionaries, and listOp type eligibility
        forbidden_local_logic:
          - independent token equality domain
          - raw string token identity for comparable token values

  usd-tokens:
    skill: skills/usd-tokens/SKILL.md
    depends_on: []
    provides:
      - capability: token_identity
        contract: contracts/handles/token.handle.json
        summary: Registered-string token identity, string conversion, equality, and hashing

  usd-paths:
    skill: skills/usd-paths/SKILL.md
    depends_on:
      - usd-identifiers-and-names
      - usd-tokens
    provides:
      - absolute prim paths
      - property paths
      - path references
      - parent/name path construction
      - path element ordering
      - path handle hot-operation performance targets
    consumes:
      - provider: usd-identifiers-and-names
        capability: identifier_scanner
        required: true
        contract: contracts/capabilities/identifier-scanner.json
        semantic_owner: usd-identifiers-and-names
        allowed_local_logic:
          - path delimiters and grammar sequencing
          - variant selection punctuation
          - canonical path assembly and path-specific errors
        forbidden_local_logic:
          - independent UTF-8 decode policy
          - independent XID start/continue policy
          - local identifier validity reimplementation
        exceptions:
          - reason: performance_contract_conflict
            allowed_if:
              - consuming the provider entrypoint would violate a declared path performance target
              - the target-local fast path passes the provider conformance subset
              - the target-local fast path passes path conformance and performance targets
              - the exception is declared in the graph or target report
            preference_order:
              - improve the provider capability API
              - add a provider-owned performance-oriented entrypoint
              - use a declared target-local fast path as a last resort

  usd-listops-authored:
    skill: skills/usd-listops-authored/SKILL.md
    depends_on:
      - usd-tokens
      - usd-foundational-values
      - usd-paths
    provides:
      - capability: authored_listops
        contract: contracts/handles/listops-authored.handle.json
        summary: Native authored listOp storage, explicit/prepend/append/delete subfields, empty listOps, and last-one-wins subfield authoring
      - explicit list operations
      - prepend/append/delete list operations
      - authored listOp parsing contract
      - last-one-wins per listOp subfield
    consumes:
      - provider: usd-tokens
        capability: token_identity
        required: true
        contract: contracts/handles/token.handle.json
        semantic_owner: usd-tokens
      - provider: usd-foundational-values
        capability: foundational_value_model
        required: true
        contract: contracts/handles/foundational-values.handle.json
        semantic_owner: usd-foundational-values
      - provider: usd-paths
        capability: absolute prim paths
        required: true
        semantic_owner: usd-paths

  usd-document-model:
    skill: skills/usd-document-model/SKILL.md
    depends_on:
      - usd-tokens
      - usd-identifiers-and-names
      - usd-foundational-values
      - usd-paths
      - usd-listops-authored
    provides:
      - capability: document_model
        contract: contracts/handles/document-model.handle.json
        contracts:
          - contracts/capabilities/document-data-model.json
          - contracts/capabilities/semantic-runtime-types.json
        summary: Layer/spec/field storage, child-list maintenance, and duplicate spec path rejection
      - core metadata field token vocabulary
      - Layer
      - Spec
      - LayerSpec
      - PrimSpec
      - AttributeSpec
      - RelationshipSpec
      - field storage
      - child list maintenance
      - duplicate path rejection
    consumes:
      - provider: usd-tokens
        capability: token_identity
        required: true
        contract: contracts/handles/token.handle.json
        semantic_owner: usd-tokens
      - provider: usd-identifiers-and-names
        capability: names
        required: true
        semantic_owner: usd-identifiers-and-names
      - provider: usd-foundational-values
        capability: foundational_value_model
        required: true
        contract: contracts/handles/foundational-values.handle.json
        semantic_owner: usd-foundational-values
      - provider: usd-paths
        capability: parent/name path construction
        required: true
        semantic_owner: usd-paths
      - provider: usd-listops-authored
        capability: authored_listops
        required: true
        contract: contracts/handles/listops-authored.handle.json
        semantic_owner: usd-listops-authored

  usda-lexical-format:
    skill: skills/usda-lexical-format/SKILL.md
    depends_on:
      - usd-identifiers-and-names
    provides:
      - capability: usda_lexical_format
        contract: contracts/capabilities/usda-lexical-format.json
        summary: USDA UTF-8 text lexing, header recognition, comments, literals, and parser token substrate
    consumes:
      - provider: usd-identifiers-and-names
        capability: identifier_scanner
        required: true
        contract: contracts/capabilities/identifier-scanner.json
        semantic_owner: usd-identifiers-and-names

  usda-value-parser:
    skill: skills/usda-value-parser/SKILL.md
    depends_on:
      - usda-lexical-format
      - usd-foundational-values
      - usd-paths
      - usd-listops-authored
    provides:
      - capability: usda_value_parser
        contract: contracts/handles/usda-value-parser.handle.json
        contracts:
          - contracts/usda-productions/value-syntax.contract.json
        summary: USDA textual value parsing into foundational values, paths, and authored listOps
    consumes:
      - provider: usda-lexical-format
        capability: usda_lexical_format
        required: true
        contract: contracts/capabilities/usda-lexical-format.json
        semantic_owner: usda-lexical-format
      - provider: usd-foundational-values
        capability: foundational_value_model
        required: true
        contract: contracts/handles/foundational-values.handle.json
        semantic_owner: usd-foundational-values
      - provider: usd-paths
        capability: path references
        required: true
        contract: contracts/handles/path.handle.json
        semantic_owner: usd-paths
      - provider: usd-listops-authored
        capability: authored_listops
        required: true
        contract: contracts/handles/listops-authored.handle.json
        semantic_owner: usd-listops-authored

  usda-spec-parser:
    skill: skills/usda-spec-parser/SKILL.md
    depends_on:
      - usda-lexical-format
      - usda-value-parser
      - usd-document-model
      - usd-paths
    provides:
      - capability: usda_spec_parser
        contract: contracts/handles/usda-spec-parser.handle.json
        contracts:
          - contracts/usda-productions/common-metadata.contract.json
          - contracts/usda-productions/layer-structure.contract.json
          - contracts/usda-productions/layer-metadata.contract.json
          - contracts/usda-productions/prim-specs.contract.json
          - contracts/usda-productions/attribute-specs.contract.json
          - contracts/usda-productions/relationship-specs.contract.json
          - contracts/usda-productions/variant-specs.contract.json
          - contracts/usda-productions/parser-diagnostics.contract.json
          - contracts/spec-coverage/usda-single-layer.coverage.json
        summary: USDA single-layer parser that builds and returns document-model layers
    consumes:
      - provider: usda-lexical-format
        capability: usda_lexical_format
        required: true
        contract: contracts/capabilities/usda-lexical-format.json
        semantic_owner: usda-lexical-format
      - provider: usda-value-parser
        capability: usda_value_parser
        required: true
        contract: contracts/handles/usda-value-parser.handle.json
        semantic_owner: usda-value-parser
      - provider: usd-document-model
        capability: document_model
        required: true
        contract: contracts/handles/document-model.handle.json
        semantic_owner: usd-document-model
      - provider: usd-paths
        capability: parent/name path construction
        required: true
        semantic_owner: usd-paths

  usd-resource-protocol:
    skill: skills/usd-resource-protocol/SKILL.md
    depends_on: []
    provides:
      - capability: resource_protocol
        contract: contracts/handles/resource.handle.json
        summary: typed resolved resource locations and local filesystem/file URI resource I/O

  usda-layer-open:
    skill: skills/usda-layer-open/SKILL.md
    depends_on:
      - usda-spec-parser
    provides:
      - capability: usda_layer_format
        contract: contracts/handles/usda-layer-open.handle.json
        summary: USDA text layer format handler for generic layer-open dispatch
    consumes:
      - provider: usda-spec-parser
        capability: usda_spec_parser
        required: true
        contract: contracts/handles/usda-spec-parser.handle.json
        semantic_owner: usda-spec-parser
        allowed_local_logic:
          - UTF-8 resource decoding before parser handoff
          - USDA format handler diagnostics before parser handoff
          - target-native layer result pass-through from parser output
        forbidden_local_logic:
          - direct document-model mutation
          - parser-local USDA grammar parsing
          - parser-local value parsing
          - parser-local path construction

  usdc-binary-format:
    skill: skills/usdc-binary-format/SKILL.md
    depends_on: []
    provides:
      - capability: usdc_binary_format
        contract: contracts/handles/usdc-binary-format.handle.json
        contracts:
          - contracts/usdc-productions/crate-header-bootstrap.contract.json
          - contracts/usdc-productions/crate-toc.contract.json
          - contracts/usdc-productions/crate-compression.contract.json
        summary: USDC Crate byte cursor, header/version validation, table-of-contents reads, and compressed buffer primitives
      - Crate byte cursor
      - little-endian primitive reads
      - USDC header and version validation
      - Crate bootstrap and table of contents
      - LZ4 buffer decompression
      - compressed integer array decoding

  usdc-value-decoder:
    skill: skills/usdc-value-decoder/SKILL.md
    depends_on:
      - usdc-binary-format
      - usd-tokens
      - usd-foundational-values
      - usd-paths
      - usd-listops-authored
    provides:
      - capability: usdc_value_decoder
        contract: contracts/handles/usdc-value-decoder.handle.json
        contracts:
          - contracts/usdc-productions/crate-value-representations.contract.json
        summary: USDC Crate value representation decoding into canonical USD field values
      - Crate value representation decoding
      - token, string, and path index resolution
      - scalar and vector values used by initial USDC fixtures
      - dictionaries
      - authored listOp values
      - specifier and variability values
    consumes:
      - provider: usdc-binary-format
        capability: usdc_binary_format
        required: true
        contract: contracts/handles/usdc-binary-format.handle.json
        semantic_owner: usdc-binary-format
      - provider: usd-tokens
        capability: token_identity
        required: true
        contract: contracts/handles/token.handle.json
        semantic_owner: usd-tokens
      - provider: usd-foundational-values
        capability: foundational_value_model
        required: true
        contract: contracts/handles/foundational-values.handle.json
        semantic_owner: usd-foundational-values
      - provider: usd-paths
        capability: path references
        required: true
        semantic_owner: usd-paths
      - provider: usd-listops-authored
        capability: authored_listops
        required: true
        contract: contracts/handles/listops-authored.handle.json
        semantic_owner: usd-listops-authored

  usdc-spec-parser:
    skill: skills/usdc-spec-parser/SKILL.md
    depends_on:
      - usdc-binary-format
      - usdc-value-decoder
      - usd-document-model
      - usd-paths
    provides:
      - capability: usdc_spec_parser
        contract: contracts/handles/usdc-spec-parser.handle.json
        contracts:
          - contracts/usdc-productions/crate-section-layouts.contract.json
          - contracts/usdc-productions/crate-reader-diagnostics.contract.json
        summary: USDC section parser that maps Crate tables into target-native document-model Layer results
      - USDC section parser
      - Crate spec form mapping
      - document-model spec construction
      - authored field attachment
      - target-native document-model Layer result
    consumes:
      - provider: usdc-binary-format
        capability: usdc_binary_format
        required: true
        contract: contracts/handles/usdc-binary-format.handle.json
        semantic_owner: usdc-binary-format
      - provider: usdc-value-decoder
        capability: usdc_value_decoder
        required: true
        contract: contracts/handles/usdc-value-decoder.handle.json
        semantic_owner: usdc-value-decoder
      - provider: usd-document-model
        capability: document_model
        required: true
        contract: contracts/handles/document-model.handle.json
        semantic_owner: usd-document-model
      - provider: usd-paths
        capability: parent/name path construction
        required: true
        semantic_owner: usd-paths

  usdc-layer-open:
    skill: skills/usdc-layer-open/SKILL.md
    depends_on:
      - usdc-spec-parser
    provides:
      - capability: usdc_layer_format
        contract: contracts/handles/usdc-layer-open.handle.json
        summary: USDC binary layer format handler for generic layer-open dispatch
    consumes:
      - provider: usdc-spec-parser
        capability: usdc_spec_parser
        required: true
        contract: contracts/handles/usdc-spec-parser.handle.json
        semantic_owner: usdc-spec-parser
        allowed_local_logic:
          - USDC extension recognition before parser handoff
          - USDC format handler diagnostics before parser handoff
          - target-native layer result pass-through from parser output
        forbidden_local_logic:
          - direct document-model mutation
          - parser-local Crate section mapping
          - parser-local Crate value decoding
          - USDA lexer, value parser, or spec parser calls

  usdz-package-format:
    skill: skills/usdz-package-format/SKILL.md
    depends_on: []
    provides:
      - capability: usdz_package_format
        contract: contracts/handles/usdz-package-format.handle.json
        contracts:
          - contracts/usdz-productions/package-layout.contract.json
          - contracts/usdz-productions/package-diagnostics.contract.json
        summary: USDZ ZIP structure indexing, entry validation, default selection, explicit lookup, and non-owning entry byte views
      - USDZ archive index
      - USDZ entry byte view
      - default package layer selection
      - explicit package entry lookup

  usdz-layer-open:
    skill: skills/usdz-layer-open/SKILL.md
    depends_on:
      - usdz-package-format
      - usda-layer-open
      - usdc-layer-open
    provides:
      - capability: usdz_layer_format
        contract: contracts/handles/usdz-layer-open.handle.json
        summary: USDZ package layer handler for generic layer-open dispatch
    consumes:
      - provider: usdz-package-format
        capability: usdz_package_format
        required: true
        contract: contracts/handles/usdz-package-format.handle.json
        semantic_owner: usdz-package-format
      - provider: usda-layer-open
        capability: usda_layer_format
        required: true
        contract: contracts/handles/usda-layer-open.handle.json
        semantic_owner: usda-layer-open
      - provider: usdc-layer-open
        capability: usdc_layer_format
        required: true
        contract: contracts/handles/usdc-layer-open.handle.json
        semantic_owner: usdc-layer-open

  usd-layer-open:
    skill: skills/usd-layer-open/SKILL.md
    depends_on:
      - usd-resource-protocol
    optional_depends_on:
      - usda-layer-open
      - usdc-layer-open
      - usdz-layer-open
    consumes:
      - provider: usd-resource-protocol
        capability: resource_protocol
        required: true
        contract: contracts/handles/resource.handle.json
        semantic_owner: usd-resource-protocol
        allowed_local_logic:
          - format dispatch from an opened resolved location
          - entrypoint argument handling and canonical dump adapter output
        forbidden_local_logic:
          - independent URI parsing
          - local file URI conversion outside the resource protocol
          - parser-local package resource splitting
          - falling back from unsupported URI schemes to filesystem paths
      - provider: usda-layer-open
        capability: usda_layer_format
        required: false
        contract: contracts/handles/usda-layer-open.handle.json
        semantic_owner: usda-layer-open
        allowed_local_logic:
          - USDA format selection from resolved location metadata
          - USDA handler invocation
          - unsupported format diagnostics when no handler matches
        forbidden_local_logic:
          - direct USDA grammar parsing
          - direct usda-spec-parser invocation
          - USDC binary parsing
          - USDZ package parsing
      - provider: usdc-layer-open
        capability: usdc_layer_format
        required: false
        contract: contracts/handles/usdc-layer-open.handle.json
        semantic_owner: usdc-layer-open
        allowed_local_logic:
          - USDC format selection from resolved location metadata
          - USDC handler invocation
          - unsupported format diagnostics when no handler matches
        forbidden_local_logic:
          - direct Crate byte parsing
          - direct usdc-spec-parser invocation
          - USDA grammar parsing
          - USDZ package parsing
      - provider: usdz-layer-open
        capability: usdz_layer_format
        required: false
        contract: contracts/handles/usdz-layer-open.handle.json
        semantic_owner: usdz-layer-open
        allowed_local_logic:
          - USDZ format selection from resolved location metadata
          - package outer resource handoff
          - explicit package entry handoff
        forbidden_local_logic:
          - direct ZIP central directory parsing
          - direct package entry byte slicing
          - USDA grammar parsing
          - USDC binary parsing
    provides:
      - capability: layer_open
        contract: contracts/handles/layer-open.handle.json
        summary: open resolved layer resources, dispatch to layer-format handlers, and return document-model layers

  usd-single-layer-namespace-source:
    skill: skills/usd-single-layer-namespace-source/SKILL.md
    depends_on:
      - usd-document-model
      - usd-paths
      - usd-tokens
    consumes:
      - provider: usd-document-model
        capability: document_model
        required: true
        contract: contracts/handles/document-model.handle.json
        semantic_owner: usd-document-model
        allowed_local_logic:
          - wrapping an existing document-model Layer as a namespace source
          - bulk enumeration of layer specs through document-model APIs
          - source capability reporting for single-layer inputs
        forbidden_local_logic:
          - independent layer/spec/field storage
          - parser-local USDA tree access
          - composition arc evaluation
          - inactive pruning
      - provider: usd-paths
        capability: parent/name path construction
        required: true
        contract: contracts/handles/path.handle.json
        semantic_owner: usd-paths
      - provider: usd-tokens
        capability: token_identity
        required: true
        contract: contracts/handles/token.handle.json
        semantic_owner: usd-tokens
    provides:
      - capability: namespace_source
        contract: contracts/handles/single-layer-namespace-source.handle.json
        contracts:
          - contracts/capabilities/namespace-source.json
          - contracts/capabilities/semantic-runtime-types.json
        summary: degenerate namespace source backed by one document-model Layer

  usd-layer-stack-namespace-source:
    skill: skills/usd-layer-stack-namespace-source/SKILL.md
    depends_on:
      - usd-document-model
      - usd-paths
      - usd-tokens
    consumes:
      - provider: usd-document-model
        capability: document_model
        required: true
        contract: contracts/handles/document-model.handle.json
        semantic_owner: usd-document-model
        allowed_local_logic:
          - wrapping already-opened document-model Layers as a direct layer-stack namespace source
          - indexing contributing specs across root and direct sublayers
          - partial sublayer composition of population fields and child/property name lists
          - source capability reporting for layer-stack inputs
        forbidden_local_logic:
          - independent layer/spec/field storage
          - parser-local USDA tree access
          - asset resolution or file opening for sublayer identifiers
          - recursive sublayer stack loading
          - reference, payload, inherits, specializes, variant, or relocate composition
          - stage population or inactive pruning
      - provider: usd-paths
        capability: parent/name path construction
        required: true
        contract: contracts/handles/path.handle.json
        semantic_owner: usd-paths
      - provider: usd-tokens
        capability: token_identity
        required: true
        contract: contracts/handles/token.handle.json
        semantic_owner: usd-tokens
    provides:
      - capability: namespace_source
        contract: contracts/handles/layer-stack-namespace-source.handle.json
        contracts:
          - contracts/capabilities/namespace-source.json
          - contracts/capabilities/semantic-runtime-types.json
          - contracts/spec-coverage/sublayer-composition.coverage.json
          - contracts/performance/layer-stack-namespace-source.performance.json
        summary: partial composed namespace source backed by a root layer and direct already-opened sublayers

  usd-layer-stack-open:
    skill: skills/usd-layer-stack-open/SKILL.md
    depends_on:
      - usd-layer-open
      - usda-layer-open
      - usd-resource-protocol
      - usd-layer-stack-namespace-source
    consumes:
      - provider: usd-layer-open
        capability: layer_open
        required: true
        contract: contracts/handles/layer-open.handle.json
        semantic_owner: usd-layer-open
        allowed_local_logic:
          - root layer open orchestration
          - direct sublayer open orchestration
          - layer-open diagnostic aggregation
        forbidden_local_logic:
          - direct resource reads that bypass usd-layer-open
          - direct USDA parser invocation
          - local document-model mutation outside opened Layer results
      - provider: usd-resource-protocol
        capability: resource_protocol
        required: true
        contract: contracts/handles/resource.handle.json
        semantic_owner: usd-resource-protocol
        allowed_local_logic:
          - local root-relative sublayer identifier resolution before layer-open calls
          - unsupported sublayer resource diagnostics
        forbidden_local_logic:
          - ad hoc URI parsing
          - unsupported URI fallback to filesystem paths
          - package resource loading
          - network protocol loading
      - provider: usd-layer-stack-namespace-source
        capability: namespace_source
        required: true
        contract: contracts/handles/layer-stack-namespace-source.handle.json
        semantic_owner: usd-layer-stack-namespace-source
        allowed_local_logic:
          - passing opened root and direct sublayer Layers to the layer-stack source
          - returning the constructed source through a layer-stack-open result
        forbidden_local_logic:
          - reimplementing child/property composition
          - reimplementing effective specifier rules
          - stage population
    provides:
      - capability: layer_stack_open
        contract: contracts/handles/layer-stack-open.handle.json
        contracts:
          - contracts/spec-coverage/sublayer-loading.coverage.json
        summary: open a root layer and direct local sublayers into a layer-stack namespace source

  usd-variant-namespace-source:
    skill: skills/usd-variant-namespace-source/SKILL.md
    depends_on:
      - usd-specializes-namespace-source
      - usd-document-model
      - usd-paths
      - usd-tokens
    consumes:
      - provider: usd-specializes-namespace-source
        capability: namespace_source
        required: true
        contract: contracts/capabilities/non-variant-namespace-source-input.json
        concrete_provider_contract: contracts/handles/specializes-namespace-source.handle.json
        semantic_owner: non-variant-namespace-source-input
        role: terminal_non_variant_namespace_source
        allowed_local_logic:
          - wrapping base namespace-source opinions with direct selected variant composition
          - computing selected variants after terminal non-variant opinions are available
          - reading source-visible variantSelection fields from strength-ordered prim opinions
          - recursively discovering selected variants from composed selected-variant namespaces
          - inserting selected variant opinions at their LIVERPS strength relative to local, inherits, relocates, reference, payload, and specializes opinions
        forbidden_local_logic:
          - bypassing the namespace-source boundary to inspect parser-local state
          - reimplementing sublayer, reference, payload, relocates, inherits, or specializes composition
          - stage population or inactive pruning
      - provider: usd-document-model
        capability: document_model
        required: true
        contract: contracts/handles/document-model.handle.json
        semantic_owner: usd-document-model
        allowed_local_logic:
          - using target-native field values exposed by the base namespace source
          - projecting selected variant specs into the owning prim namespace
        forbidden_local_logic:
          - independent layer/spec/field storage
          - direct parser-local variant storage reads
          - canonical JSON layer dump storage
      - provider: usd-paths
        capability: parent/name path construction
        required: true
        contract: contracts/handles/path.handle.json
        semantic_owner: usd-paths
      - provider: usd-tokens
        capability: token_identity
        required: true
        contract: contracts/handles/token.handle.json
        semantic_owner: usd-tokens
    provides:
      - capability: namespace_source
